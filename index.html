<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Misión Humanitaria · Seguimiento de Insumos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#13202E; --muted:#5C6B7A; --bg:#EAEEF3; --panel:#FFFFFF;
  --line:#D8E0E8; --line2:#E7ECF1;
  --deep:#143C5B; --blue:#1F6FB2;
  --green:#0F7A4D; --teal:#0E7C86; --amber:#B26A00;
  --red:#B42318; --reddeep:#7F1D1D; --orange:#C2410C;
  --shadow:0 1px 2px rgba(19,32,46,.06),0 6px 18px rgba(19,32,46,.06);
}
*{box-sizing:border-box}
html,body{margin:0}
body{
  background:var(--bg); color:var(--ink);
  font-family:"Inter",system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  font-size:14px; line-height:1.45; -webkit-font-smoothing:antialiased;
}
.num{font-family:"IBM Plex Mono",ui-monospace,monospace; font-variant-numeric:tabular-nums}
.wrap{max-width:1240px; margin:0 auto; padding:0 18px 56px}

/* Header */
header.top{background:var(--deep); color:#EAF2F9; }
.top-in{max-width:1240px; margin:0 auto; padding:18px; display:flex; gap:18px; align-items:flex-start; flex-wrap:wrap; justify-content:space-between}
.brand h1{font-family:"Archivo",sans-serif; font-weight:800; font-size:21px; letter-spacing:-.01em; margin:0; line-height:1.15}
.corridor{display:flex; align-items:center; gap:9px; margin-top:7px; font-family:"Archivo",sans-serif; font-weight:600; font-size:12px; letter-spacing:.14em; text-transform:uppercase; color:#9FC2DD}
.corridor .dot{width:6px;height:6px;border-radius:50%;background:#5FA8D6}
.corridor .arr{color:#5FA8D6;font-weight:700}
.status-area{display:flex; align-items:center; gap:10px; flex-wrap:wrap}
.pill{display:inline-flex; align-items:center; gap:8px; background:rgba(255,255,255,.10); border:1px solid rgba(255,255,255,.18); color:#EAF2F9; padding:7px 12px; border-radius:999px; font-size:12.5px; font-weight:500}
.pill .ring{width:9px;height:9px;border-radius:50%;background:#46C08A;box-shadow:0 0 0 3px rgba(70,192,138,.25)}
.pill.warn .ring{background:#F2B441;box-shadow:0 0 0 3px rgba(242,180,65,.25)}
.pill.loading .ring{background:#5FA8D6;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.btn{font-family:"Inter",sans-serif;font-weight:600;font-size:12.5px;cursor:pointer;border:1px solid rgba(255,255,255,.25);background:rgba(255,255,255,.08);color:#EAF2F9;padding:7px 13px;border-radius:8px}
.btn:hover{background:rgba(255,255,255,.16)}
.btn:active{transform:translateY(1px)}

/* Tabs */
.tabs{display:flex; gap:4px; margin:18px 0 16px; background:var(--panel); padding:5px; border-radius:12px; border:1px solid var(--line); width:max-content; max-width:100%; box-shadow:var(--shadow)}
.tab{font-family:"Archivo",sans-serif;font-weight:600;font-size:14px;border:0;background:transparent;color:var(--muted);padding:9px 16px;border-radius:8px;cursor:pointer;white-space:nowrap}
.tab[aria-selected="true"]{background:var(--deep);color:#fff}
.tab:not([aria-selected="true"]):hover{background:var(--line2);color:var(--ink)}

/* Cards */
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:18px}
.card{background:var(--panel);border:1px solid var(--line);border-left:4px solid var(--blue);border-radius:12px;padding:13px 15px;box-shadow:var(--shadow);position:relative}
.card.clickable{cursor:pointer;transition:transform .08s ease, box-shadow .12s ease}
.card.clickable:hover{transform:translateY(-2px);box-shadow:0 4px 10px rgba(19,32,46,.10),0 14px 30px rgba(19,32,46,.10)}
.card.active{outline:2px solid var(--deep);outline-offset:1px}
.card .k{font-size:12px;color:var(--muted);font-weight:500;display:flex;align-items:center;gap:7px;letter-spacing:.01em}
.card .v{font-family:"Archivo",sans-serif;font-weight:800;font-size:27px;line-height:1.05;margin-top:7px;letter-spacing:-.02em}
.card .sub{font-size:11.5px;color:var(--muted);margin-top:3px}
.card.alert{border-left-style:dashed;border-left-color:var(--red)}
.swatch{width:10px;height:10px;border-radius:3px;flex:0 0 auto}

/* Quick box (3 categorías) */
.quickwrap{margin-bottom:14px}
.eyebrow{font-family:"Archivo",sans-serif;font-weight:600;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin:0 0 8px 2px}
.quickbox{display:grid;grid-template-columns:repeat(3,1fr);gap:0;background:var(--panel);border:1px solid var(--line);border-radius:12px;overflow:hidden;box-shadow:var(--shadow)}
.qseg{padding:14px 16px;cursor:pointer;border-left:1px solid var(--line2);position:relative;transition:background .1s ease}
.qseg:first-child{border-left:0}
.qseg:hover{background:#F6F9FB}
.qseg.active{background:#F2F7FB}
.qseg .top{display:flex;align-items:center;gap:8px}
.qseg .bar{width:11px;height:11px;border-radius:3px;flex:0 0 auto}
.qseg .lbl{font-family:"Archivo",sans-serif;font-weight:700;font-size:14px}
.qseg .qv{font-family:"Archivo",sans-serif;font-weight:800;font-size:28px;letter-spacing:-.02em;margin-top:6px;line-height:1}
.qseg .qsub{font-size:11.5px;color:var(--muted);margin-top:2px}
.qseg.active::after{content:"";position:absolute;left:0;right:0;bottom:0;height:3px;background:currentColor}
@media (max-width:560px){.quickbox{grid-template-columns:1fr}.qseg{border-left:0;border-top:1px solid var(--line2)}.qseg:first-child{border-top:0}}

/* Toolbar */
.toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
.search{flex:1 1 240px;min-width:200px;position:relative}
.search input{width:100%;padding:10px 12px 10px 34px;border:1px solid var(--line);border-radius:9px;background:var(--panel);font:inherit;color:var(--ink)}
.search input:focus{outline:2px solid var(--blue);outline-offset:-1px;border-color:var(--blue)}
.search svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted)}
.sel{position:relative}
.sel select{appearance:none;-webkit-appearance:none;padding:10px 32px 10px 12px;border:1px solid var(--line);border-radius:9px;background:var(--panel);font:inherit;color:var(--ink);cursor:pointer;max-width:230px}
.sel select:focus{outline:2px solid var(--blue);outline-offset:-1px}
.sel::after{content:"";position:absolute;right:13px;top:50%;width:7px;height:7px;border-right:2px solid var(--muted);border-bottom:2px solid var(--muted);transform:translateY(-70%) rotate(45deg);pointer-events:none}
.clear{font:inherit;font-weight:600;font-size:12.5px;color:var(--blue);background:none;border:0;cursor:pointer;padding:8px 6px}
.clear:hover{text-decoration:underline}
.chips{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:12px;min-height:1px}
.chip{display:inline-flex;align-items:center;gap:7px;background:var(--panel);border:1px solid var(--line);border-radius:999px;padding:5px 7px 5px 11px;font-size:12px;color:var(--ink);font-weight:500}
.chip b{font-weight:600}
.chip button{border:0;background:var(--line2);color:var(--muted);width:18px;height:18px;border-radius:50%;cursor:pointer;font-size:13px;line-height:1;display:grid;place-items:center}
.chip button:hover{background:#d6dde4;color:var(--ink)}

/* Table */
.tablecard{background:var(--panel);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);overflow:hidden}
.scroll{overflow-x:auto}
table{border-collapse:collapse;width:100%;font-size:13px}
thead th{position:sticky;top:0;background:#F4F7FA;border-bottom:1px solid var(--line);text-align:left;padding:11px 12px;font-family:"Archivo",sans-serif;font-weight:600;font-size:12px;color:var(--deep);white-space:nowrap;cursor:pointer;user-select:none}
thead th:hover{background:#ECF1F6}
thead th .ind{color:var(--blue);font-size:10px;margin-left:4px}
thead th.n, td.n{text-align:right}
tbody td{padding:10px 12px;border-bottom:1px solid var(--line2);vertical-align:top}
tbody tr:hover{background:#F6F9FB}
tbody tr:last-child td{border-bottom:0}
td.muted{color:#9AA7B4}
.itemcell{font-weight:600;color:var(--ink);max-width:280px}
.statuspill{display:inline-flex;align-items:center;gap:6px;padding:3px 9px;border-radius:999px;font-size:11.5px;font-weight:600;white-space:nowrap;border:1px solid}
.count{padding:10px 14px;font-size:12px;color:var(--muted);border-top:1px solid var(--line2);background:#FBFCFD}
.empty{padding:40px 18px;text-align:center;color:var(--muted)}
.empty b{color:var(--ink);display:block;margin-bottom:4px;font-family:"Archivo",sans-serif}
footer{margin-top:16px;font-size:11.5px;color:var(--muted);line-height:1.6}
footer a{color:var(--blue)}
.banner{display:none;background:#FFF7E8;border:1px solid #F0D89A;color:#7A5408;border-radius:10px;padding:11px 14px;font-size:12.5px;margin-bottom:14px}
.banner.show{display:block}
@media (max-width:640px){
  .card .v{font-size:23px}
  .top-in{flex-direction:column}
  .itemcell{max-width:200px}
}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>

// ---------- helpers ----------
const norm = s => String(s==null?"":s).replace(/\s+/g," ").trim().toLowerCase();
const isBlank = v => v==null || v==="" || v==="—" || String(v).trim()==="";
function toNum(v){
  if(isBlank(v)) return null;
  const n = parseFloat(String(v).replace(/,/g,"").replace(/[^0-9.\-]/g,""));
  return isNaN(n)?null:n;
}
function fmt(n){ return n==null?"":n.toLocaleString("es-SV",{maximumFractionDigits:1}); }

// RFC4180-ish CSV parser -> array of rows
function parseCSV(text){
  const rows=[]; let row=[], val="", q=false;
  for(let i=0;i<text.length;i++){
    const c=text[i];
    if(q){
      if(c==='"'){ if(text[i+1]==='"'){val+='"';i++;} else q=false; }
      else val+=c;
    } else {
      if(c==='"') q=true;
      else if(c===','){ row.push(val); val=""; }
      else if(c==='\n'){ row.push(val); rows.push(row); row=[]; val=""; }
      else if(c==='\r'){ /* skip */ }
      else val+=c;
    }
  }
  if(val!==""||row.length){ row.push(val); rows.push(row); }
  return rows;
}

// Map a raw CSV grid into {headers, records} using the tab's canonical headers
function gridToRecords(grid, cfg, canonHeaders){
  // find header row by markers
  let hIdx=-1;
  for(let r=0;r<grid.length;r++){
    const cells = grid[r].map(norm);
    if(cfg.headerMarkers.every(m=>cells.some(c=>c.includes(m)))){ hIdx=r; break; }
  }
  if(hIdx<0) throw new Error("No se encontró la fila de encabezados");
  const rawHead = grid[hIdx].map(norm);
  // build column index for each canonical header
  const colOf = {};
  canonHeaders.forEach(h=>{
    const nh = norm(h);
    let j = rawHead.indexOf(nh);
    if(j<0) j = rawHead.findIndex(c=>c && (c.includes(nh)||nh.includes(c)));
    colOf[h]=j;
  });
  const recs=[];
  for(let r=hIdx+1;r<grid.length;r++){
    const cells = grid[r];
    const joined = norm(cells.join(" "));
    if(joined.includes("totales") || joined.includes("resumen por")) break;
    const o={};
    canonHeaders.forEach(h=>{ const j=colOf[h]; o[h]= (j>=0 && j<cells.length)? cells[j] : ""; });
    if(isBlank(o[cfg.keyField])) continue;
    recs.push(o);
  }
  return { headers:canonHeaders, records:recs };
}

async function fetchTab(key){
  const cfg = TABS[key];
  const url = "https://docs.google.com/spreadsheets/d/"+SHEET_ID+"/gviz/tq?tqx=out:csv&sheet="+encodeURIComponent(cfg.sheetName)+"&t="+Date.now();
  const res = await fetch(url, {cache:"no-store"});
  if(!res.ok) throw new Error("HTTP "+res.status);
  const text = await res.text();
  if(/<html|google\.visualization|requires sign|accounts\.google/i.test(text.slice(0,400)))
    throw new Error("El Sheet no es público");
  const grid = parseCSV(text);
  const canon = SNAPSHOT[key].headers; // canonical column order from snapshot
  return gridToRecords(grid, cfg, canon);
}

async function refresh(manual){
  setSync("loading","Actualizando…");
  let okCount=0, failNote="";
  await Promise.all(Object.keys(TABS).map(async key=>{
    try{
      const r = await fetchTab(key);
      DATA[key]=r; META[key]={live:true,time:new Date()};
      okCount++;
    }catch(e){
      failNote = e.message || "error";
      if(!DATA[key]){ DATA[key]=SNAPSHOT[key]; META[key]={live:false,time:null}; }
    }
  }));
  if(okCount===Object.keys(TABS).length){
    setSync("ok","En vivo · "+timeStr(new Date()));
    hideBanner();
  } else if(okCount>0){
    setSync("warn","Parcial · "+timeStr(new Date()));
    showBanner("Algunas pestañas no se pudieron leer en vivo ("+failNote+"). Se muestran los últimos datos disponibles.");
  } else {
    setSync("warn","Respaldo · "+SNAPSHOT.generated);
    showBanner("No se pudo leer el Sheet en vivo ("+failNote+"). Mostrando el respaldo del "+SNAPSHOT.generated+". Verifica que el documento esté compartido como «Cualquier persona con el enlace: Lector».");
  }
  render();
}

function timeStr(d){ return d.toLocaleTimeString("es-SV",{hour:"2-digit",minute:"2-digit",second:"2-digit"}); }
function setSync(state,txt){
  const p=document.getElementById("syncPill");
  p.className="pill "+(state==="ok"?"":state);
  document.getElementById("syncText").textContent=txt;
}
function showBanner(m){ const b=document.getElementById("banner"); b.textContent=m; b.classList.add("show"); }
function hideBanner(){ document.getElementById("banner").classList.remove("show"); }

// ---------- filtering ----------
function activeRecords(){
  const cfg=TABS[current]; const recs=(DATA[current]||SNAPSHOT[current]).records;
  let out = recs.filter(r=>{
    for(const f in filters){ if(filters[f]!=null && String(r[f]).trim()!==filters[f]) return false; }
    if(statusSet.size>0 && !statusSet.has(String(r[cfg.statusField]).trim())) return false;
    if(search){
      const q=norm(search);
      const hit = cfg.searchFields.some(f=>norm(r[f]).includes(q));
      if(!hit) return false;
    }
    return true;
  });
  if(sortState.field){
    const f=sortState.field, numeric=cfg.numericFields.includes(f);
    out=out.slice().sort((a,b)=>{
      let x=a[f],y=b[f];
      if(numeric){ x=toNum(x)??-Infinity; y=toNum(y)??-Infinity; return (x-y)*sortState.dir; }
      return String(x).localeCompare(String(y),"es")*sortState.dir;
    });
  }
  return out;
}

function countBy(recs, field, value){ return recs.filter(r=>String(r[field]).trim()===value).length; }
function countIn(recs, field, values){ const s=new Set(values); return recs.filter(r=>s.has(String(r[field]).trim())).length; }
function sumBy(recs, field){ return recs.reduce((s,r)=>s+(toNum(r[field])||0),0); }
function setEquals(a, arr){ return a.size===arr.length && arr.every(v=>a.has(v)); }

// Quick box: only for herramientas (Cubierto / Falta / Sin proveedor)
function renderQuickBox(){
  const wrap=document.getElementById("quickwrap");
  const box=document.getElementById("quickbox");
  if(current!=="herramientas"){ wrap.style.display="none"; box.innerHTML=""; return; }
  wrap.style.display="";
  const all=(DATA.herramientas||SNAPSHOT.herramientas).records;
  const g=TABS.herramientas.groups;
  const segs=[
    {lbl:"Cubierto", color:"#0F7A4D", n:countIn(all,"ESTATUS",g.Cubierto), sub:"cubierto + exceso", group:g.Cubierto},
    {lbl:"Falta", color:"#B42318", n:countIn(all,"ESTATUS",g.Falta), sub:"faltante total", group:g.Falta},
    {lbl:"Sin proveedor", color:"#7F1D1D", n:countBy(all,"Mejor proveedor","Ninguno"), sub:"ningún cotizante", prov:"Ninguno"}
  ];
  box.innerHTML="";
  segs.forEach(s=>{
    const d=document.createElement("div"); d.className="qseg"; d.style.color=s.color;
    let active=false;
    if(s.group) active=setEquals(statusSet, s.group);
    else active=filters["Mejor proveedor"]==="Ninguno";
    if(active) d.classList.add("active");
    d.innerHTML='<div class="top"><span class="bar" style="background:'+s.color+'"></span><span class="lbl" style="color:var(--ink)">'+s.lbl+'</span></div>'+
                '<div class="qv num" style="color:'+s.color+'">'+s.n+'</div><div class="qsub">'+s.sub+'</div>';
    d.onclick=()=>{
      if(s.group){
        if(setEquals(statusSet, s.group)) statusSet.clear();
        else statusSet=new Set(s.group);
      } else {
        if(filters["Mejor proveedor"]==="Ninguno") delete filters["Mejor proveedor"];
        else filters["Mejor proveedor"]="Ninguno";
      }
      render();
    };
    box.appendChild(d);
  });
}

    cards.push({k:"Peso estimado", v:fmt(sumBy(all,"Peso total estimado (kg)"))+" kg", sub:"≈ "+(sumBy(all,"Peso total estimado (kg)")/1000).toFixed(1)+" t", color:"#143C5B", stat:true});
    cards.push({k:"En despacho", v:countBy(all,"Estatus","Despacho"), sub:"", color:STATUS_COLORS["Despacho"], swatch:true, status:"Despacho"});
    cards.push({k:"Pendiente", v:countBy(all,"Estatus","Pendiente"), sub:"", color:STATUS_COLORS["Pendiente"], swatch:true, status:"Pendiente"});
  }
  cards.forEach(c=>{
    const d=document.createElement("div");
    const clickable = c.status!=null || c.reset;
    d.className="card"+(clickable?" clickable":"");
    d.style.borderLeftColor=c.color;
    if(c.status!=null && statusSet.has(c.status)) d.classList.add("active");
    const sw = c.swatch?'<span class="swatch" style="background:'+c.color+'"></span>':"";
    d.innerHTML='<div class="k">'+sw+c.k+'</div><div class="v num">'+c.v+'</div>'+(c.sub?'<div class="sub">'+c.sub+'</div>':"");
    if(c.status!=null){
      d.onclick=()=>{
        if(statusSet.has(c.status)) statusSet.delete(c.status);
        else statusSet.add(c.status);
        render();
      };
    } else if(c.reset){
      d.onclick=()=>{ filters={}; statusSet.clear(); search=""; render(); };
    }
    el.appendChild(d);
  });
}

function uniqueVals(recs, field, include){
  const set=new Set();
  recs.forEach(r=>{ const v=String(r[field]).trim(); if(v&&v!=="—"&&v!=="None") set.add(v); });
  if(include) include.forEach(v=>set.add(v));
  return [...set].sort((a,b)=>a.localeCompare(b,"es"));
}

function renderToolbar(){
  const cfg=TABS[current], all=(DATA[current]||SNAPSHOT[current]).records;
  const tb=document.getElementById("toolbar"); tb.innerHTML="";
  const s=document.createElement("div"); s.className="search";
  s.innerHTML='<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>';
  const inp=document.createElement("input");
  inp.type="search"; inp.placeholder="Buscar "+cfg.itemField.toLowerCase()+"…"; inp.value=search;
  inp.oninput=e=>{ search=e.target.value; renderChips(); renderTable(); };
  s.appendChild(inp); tb.appendChild(s);
  cfg.dropdowns.forEach(dd=>{
    const w=document.createElement("div"); w.className="sel";
    const sel=document.createElement("select");
    const opts=uniqueVals(all,dd.field,dd.include);
    sel.innerHTML='<option value="">'+dd.label+': todos</option>'+opts.map(o=>'<option'+(filters[dd.field]===o?" selected":"")+'>'+o+'</option>').join("");
    sel.onchange=e=>{ const v=e.target.value; if(v) filters[dd.field]=v; else delete filters[dd.field]; render(); };
    w.appendChild(sel); tb.appendChild(w);
  });
  const c=document.createElement("button"); c.className="clear"; c.textContent="Limpiar filtros";
  c.onclick=()=>{ filters={}; statusSet.clear(); search=""; sortState={field:null,dir:1}; render(); };
  tb.appendChild(c);
}

function renderChips(){
  const el=document.getElementById("chips"); el.innerHTML="";
  const cfg=TABS[current];
  [...statusSet].forEach(s=>{
    const col=STATUS_COLORS[s]||"#5C6B7A";
    const chip=document.createElement("span"); chip.className="chip";
    chip.innerHTML='<span><span class="swatch" style="background:'+col+'"></span> <b>'+s+'</b></span>';
    const x=document.createElement("button"); x.textContent="×"; x.title="Quitar";
    x.onclick=()=>{ statusSet.delete(s); render(); };
    chip.appendChild(x); el.appendChild(chip);
  });
  Object.keys(filters).forEach(f=>{
    const chip=document.createElement("span"); chip.className="chip";
    chip.innerHTML='<span>'+f+': <b>'+filters[f]+'</b></span>';
    const x=document.createElement("button"); x.textContent="×"; x.title="Quitar";
    x.onclick=()=>{ delete filters[f]; render(); };
    chip.appendChild(x); el.appendChild(chip);
  });
  if(search){
    const chip=document.createElement("span"); chip.className="chip";
    chip.innerHTML='<span>Buscar: <b>'+search+'</b></span>';
    const x=document.createElement("button"); x.textContent="×";
    x.onclick=()=>{ search=""; renderToolbar(); render(); };
    chip.appendChild(x); el.appendChild(chip);
  }
}

function renderTable(){
  const cfg=TABS[current];
  const headers=(DATA[current]||SNAPSHOT[current]).headers;
  const recs=activeRecords();
  const thead=document.getElementById("thead"); const tbody=document.getElementById("tbody");
  thead.innerHTML=""; tbody.innerHTML="";
  const tr=document.createElement("tr");
  headers.forEach(h=>{
    const th=document.createElement("th");
    if(cfg.numericFields.includes(h)) th.className="n";
    let ind=""; if(sortState.field===h) ind='<span class="ind">'+(sortState.dir>0?"▲":"▼")+'</span>';
    th.innerHTML=h+ind;
    th.onclick=()=>{ if(sortState.field===h) sortState.dir*=-1; else {sortState.field=h;sortState.dir=1;} render(); };
    tr.appendChild(th);
  });
  thead.appendChild(tr);
  if(recs.length===0){
    tbody.innerHTML='<tr><td colspan="'+headers.length+'"><div class="empty"><b>Sin resultados</b>Ajusta la búsqueda o quita filtros para ver más ítems.</div></td></tr>';
  } else {
    recs.forEach(r=>{
      const row=document.createElement("tr");
      headers.forEach(h=>{
        const td=document.createElement("td");
        const val=r[h];
        if(h===cfg.statusField && !isBlank(val)){
          const col=STATUS_COLORS[String(val).trim()]||"#5C6B7A";
          td.innerHTML='<span class="statuspill" style="color:'+col+';border-color:'+col+'33;background:'+col+'12"><span class="swatch" style="background:'+col+'"></span>'+val+'</span>';
        } else if(isBlank(val)){
          td.className="muted"; td.textContent="—";
        } else if(cfg.numericFields.includes(h)){
          td.className="n num"; const n=toNum(val); td.textContent = n==null? val : fmt(n);
        } else if(h===cfg.itemField){
          td.className="itemcell"; td.textContent=val;
        } else {
          td.textContent=val;
        }
        row.appendChild(td);
      });
      tbody.appendChild(row);
    });
  }
  const total=(DATA[current]||SNAPSHOT[current]).records.length;
  document.getElementById("count").textContent="Mostrando "+recs.length+" de "+total+" ítems";
}

function renderFooter(){
  const m=META[current];
  const src = m.live ? ("Datos en vivo · última lectura "+(m.time?timeStr(m.time):"")) : ("Respaldo del "+SNAPSHOT.generated+" (lectura en vivo no disponible)");
  document.getElementById("footer").innerHTML =
    src+" · Auto-actualiza cada "+(REFRESH_MS/1000)+" s. "+
    '<a href="https://docs.google.com/spreadsheets/d/'+SHEET_ID+'/edit" target="_blank" rel="noopener">Abrir Sheet</a>';
}

// ---------- events ----------
document.querySelectorAll(".tab").forEach(t=>{
  t.onclick=()=>{
    document.querySelectorAll(".tab").forEach(x=>x.setAttribute("aria-selected","false"));
    t.setAttribute("aria-selected","true");
    current=t.dataset.tab; filters={}; statusSet.clear(); search=""; sortState={field:null,dir:1};
    render();
  };
});
document.getElementById("refreshBtn").onclick=()=>refresh(true);

// init: render snapshot instantly, then go live
DATA.herramientas=SNAPSHOT.herramientas; DATA.primera=SNAPSHOT.primera;
render();
refresh(false);
setInterval(()=>refresh(false), REFRESH_MS);
</script>
</body>
</html>
